[project]
name = "ai-chat-bot-server"
version = "0.1.0"
description = "FastAPI backend for the ai-chat-bot monorepo"
requires-python = ">=3.9"
dependencies = [
  "fastapi>=0.116.1,<1.0.0",
  "pydantic>=2.0.0,<3.0.0",
  "uvicorn[standard]>=0.35.0,<1.0.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
