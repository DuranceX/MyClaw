# ============================================================================
# ai-chat-bot 配置文件
# ============================================================================
#
# 配置优先级（高 → 低）：
#   环境变量 > .env 文件 > config.yaml > 字段默认值
#
# ============================================================================

# ----------------------------------------------------------------------------
# Web 跨域配置
# ----------------------------------------------------------------------------
# web_origin: "http://127.0.0.1:3000"

# ----------------------------------------------------------------------------
# LLM Provider 配置
# ----------------------------------------------------------------------------
#
# 使用方式：
#   1. 在 providers 下定义所有 provider 的 api_key / base_url
#   2. 修改 llm.provider 指向想用的 provider 名称
#   3. 修改 llm.model 指定模型
#
# 切换 provider 只需改 llm.provider + llm.model，无需手动改 api_key / base_url。
#
# 所有 provider 均使用 OpenAI 兼容格式（api_key + base_url + model）。
# ----------------------------------------------------------------------------

providers:
  bilibili:
    api_key: "bsk-9ea517c77d92cbda3e05b174e0b4d236"
    base_url: "http://llmapi.bilibili.co/v1"
  grok:
    api_key: "xai-xxx"
    base_url: "https://api.x.ai/v1"
  anthropic:
    api_key: "sk-ant-xxx"
    base_url: "https://api.anthropic.com/v1"
  ollama:
    api_key: "ollama"
    base_url: "http://127.0.0.1:11434/v1"

llm:
  provider: "grok"                          # 指向上方 providers 中的某个 key
  model: "grok-4.20-beta-latest-reasoning"  # 该 provider 下要使用的模型
  # proxy: "http://127.0.0.1:7890"          # 可选：仅模型调用走此代理，工具脚本不受影响

# ----------------------------------------------------------------------------
# 文件访问权限
# ----------------------------------------------------------------------------
# security:
#   # 允许访问的根目录（绝对路径）。
#   # 不填 = 只能访问项目根目录（PROJECT_ROOT）。
#   # 填写绝对路径可扩大范围，例如 ~/Code 允许访问 Code 下所有项目。
#   file_access_root: "~/Code"
#
#   # 排除列表：不可访问的路径（文件或目录）。
#   # 支持绝对路径，也支持相对于 file_access_root 的相对路径。
#   # 目录末尾加不加 / 均可。
#   exclude_files:
#     - "Work"          # 排除 ~/Code/Work 目录
#     - "secret.txt"    # 排除 ~/Code/secret.txt

# ----------------------------------------------------------------------------
# 工具类 API 凭证
# ----------------------------------------------------------------------------
tools:
  qweather:
    api_key: "xxx"
    api_host: "mj2k5p7yag.re.qweatherapi.com"
  serper:
    api_key: "xxx"
  cloud_mail:
    token: "xxx"

# ----------------------------------------------------------------------------
# Telegram 适配器（预留，接入时取消注释）
# ----------------------------------------------------------------------------
# telegram:
#   bot_token: ""       # 从 @BotFather 获取，建议放 .env
#   proxy: ""           # HTTP 代理，如 http://127.0.0.1:7890
#   command_prefix: "/" # 命令前缀
